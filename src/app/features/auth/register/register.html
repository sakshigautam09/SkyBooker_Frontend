<!-- Register Page -->
<div class="auth-page">
  <div class="auth-card register-card">
    <div class="auth-logo">✈️</div>
    <h1>Create Account</h1>
    <p class="subtitle">Join SkyBooker and start exploring</p>

    <!-- Role Toggle -->
    <div class="role-toggle">
      <button
        type="button"
        class="role-btn"
        [class.active]="role === 'Passenger'"
        (click)="role = 'Passenger'">
        <span class="role-icon">🧳</span>
        <span class="role-label">Passenger</span>
        <span class="role-desc">Search &amp; book flights</span>
      </button>
      <button
        type="button"
        class="role-btn"
        [class.active]="role === 'Admin'"
        (click)="role = 'Admin'">
        <span class="role-icon">🛠️</span>
        <span class="role-label">Admin</span>
        <span class="role-desc">Manage flights</span>
      </button>
    </div>

    @if (errorMsg) {
      <div class="alert-error">{{ errorMsg }}</div>
    }

    <form (ngSubmit)="onRegister()" #regForm="ngForm">
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input id="fullname" type="text" placeholder="John Doe"
          [(ngModel)]="fullName" name="fullName" required />
      </div>

      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input id="reg-email" type="email" placeholder="you@example.com"
          [(ngModel)]="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input id="phone" type="tel" placeholder="+91 00000 00000"
          [(ngModel)]="phone" name="phone" />
      </div>

      <div class="form-group">
        <label for="reg-password">Password</label>
        <input id="reg-password" type="password" placeholder="Min 8 chars, e.g. Secret@123"
          [(ngModel)]="password" name="password" required />
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input id="confirm-password" type="password" placeholder="Re-enter password"
          [(ngModel)]="confirmPassword" name="confirmPassword" required />
      </div>

      @if (role === 'Admin') {
        <div class="form-group">
          <label for="admin-key">Admin Secret Key <span class="required">*</span></label>
          <input id="admin-key" type="password" placeholder="Enter admin secret key"
            [(ngModel)]="adminSecretKey" name="adminSecretKey" />
          <span class="field-hint">Contact your platform administrator for this key.</span>
        </div>
      }

      <button class="submit-btn" type="submit" [disabled]="loading">
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <div class="auth-redirect">
      Already have an account? <a routerLink="/login">Log In</a>
    </div>
  </div>
</div>
